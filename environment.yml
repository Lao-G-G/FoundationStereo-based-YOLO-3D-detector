name: foundation_stereo
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - torch==2.4.1
    - torchvision==0.19.1
    - torchaudio==2.4.1
    - omegaconf
    - opencv-contrib-python
    - imgaug
    - ninja
    - albumentations
    - jupyterlab
    - joblib
    - scikit-learn
    - ruamel.yaml
    - trimesh
    - imageio
    - open3d
    - transformations
    - einops
    - gdown
    - nodejs
    - huggingface-hub
    - opencv-python>=4.7.0
    - numpy>=1.22.0
    - ultralytics>=8.0.0  # For YOLOv11
    - timm>=0.9.2  # Required for Depth Anything v2
    - matplotlib>=3.7.0
    - pillow>=9.4.0
    - tqdm>=4.65.0
    - scipy>=1.10.0
    - filterpy>=1.4.5  # For Kalman filtering in tracking
    - lap>=0.4.0  # For Hungarian algorithm in tracking
    - scikit-image>=0.20.0
    - pyyaml>=6.0
    - requests>=2.28.0 